###################
### PROGRAMS ###
###################
$scripts = $HOME/.config/hypr/scripts


$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun --style ~/.config/wofi/style.css --width 600 --height 400
$wallpaper = $scripts/wallpaper
$volume = $scripts/volume
$brightness = $scripts/brightness
$screenshot = $scripts/screenshot
$powerMenu = $scripts/power-menu
$hyprReload = $scripts/hypr-reload
$themeSwitcher = $scripts/theme-switcher

#################
### AUTOSTART ###
#################
exec-once = nm-applet --indicator
exec-once = waybar
exec-once = $wallpaper restore
exec-once = hypridle
exec-once = swaync
exec-once = $themeSwitcher apply
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE GTK_THEME QT_QPA_PLATFORMTHEME QT_STYLE_OVERRIDE HYPRLAND_INSTANCE_SIGNATURE

# restart waybar shortcut (use it after editing configs)
bind = SUPER_ALT, B, exec, killall waybar; waybar
bind = SUPER_ALT, R, exec, $hyprReload
bind = SUPER_ALT, T, exec, $themeSwitcher


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
